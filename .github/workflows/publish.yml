name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint, typecheck, test, build, self-scan)
        run: |
          npm run lint
          npm run typecheck
          npm run test:coverage
          npm run build
          node dist/cli.js scan --all --no-color

      - name: Publish
        run: npm publish --access public
        env:
          # Add an NPM_TOKEN secret to the repository before tagging a release.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
